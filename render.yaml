databases:
  - name: innovateus-db
    plan: free
    databaseName: innovateus
    user: innovateus_user

services:
  - type: web
    name: innovateus-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: innovateus-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: EDITOR_PASSWORD_HASH
        sync: false
      - key: CORS_ORIGINS
        value: https://innovateus-web.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.6"

  - type: web
    name: innovateus-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: innovateus-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: "20.11.0"
