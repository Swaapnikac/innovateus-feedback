services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: innovateus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: ../../infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/innovateus
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/innovateus
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
      - ../docs:/docs

  web:
    build:
      context: ../apps/web
      dockerfile: ../../infra/Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
